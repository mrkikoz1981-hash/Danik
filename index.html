<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haker_Danik Special Gift</title>
    <style>
        body { 
            background: #0d0d0d; 
            color: #ff4d94; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; margin: 0; overflow: hidden;
        }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        .content { z-index: 2; text-align: center; background: rgba(0,0,0,0.7); padding: 30px; border-radius: 20px; border: 2px solid #ff4d94; box-shadow: 0 0 20px #ff4d94; }
        img { width: 200px; height: 200px; border-radius: 50%; border: 4px solid #ff4d94; object-fit: cover; margin-bottom: 20px; }
        h1 { font-size: 2.5em; margin: 10px 0; text-shadow: 0 0 10px #ff4d94; }
        p { font-size: 1.2em; color: #fff; max-width: 400px; }
        audio { margin-top: 20px; filter: invert(1); }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="content">
        <img src="https://github.com/mrkikoz1981-hash/Danik/blob/1457dee01c4c26510b0f006685231e07986f25ee/1772807471347.png" alt="Для тебя">
        
        <h1>С 8 МАРТА!</h1>
        <p>Пусть твоя жизнь будет как идеальный код: без ошибок, с красивым интерфейсом и бесконечным запасом энергии!</p>
        
        <audio controls autoplay loop>
            <source src="ССЫЛКА_НА_МУЗЫКУ" type="audio/mpeg">
            Ваш браузер не поддерживает музыку.
        </audio>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const hearts = [];
        function createHeart() {
            return { x: Math.random() * canvas.width, y: -20, size: Math.random() * 20 + 10, speed: Math.random() * 3 + 1 };
        }
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff4d94';
            if (hearts.length < 50) hearts.push(createHeart());
            hearts.forEach((h, i) => {
                ctx.fillText('❤️', h.x, h.y);
                h.y += h.speed;
                if (h.y > canvas.height) hearts.splice(i, 1);
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
